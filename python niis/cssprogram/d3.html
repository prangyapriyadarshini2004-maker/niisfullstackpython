<!DOCTYPE html>
<html>
<head>
<style>

/* General sibling selector */
h1 ~ p {
  color: blue;
}

</style>
</head>
<body>

<h1>Heading</h1>

<p>This paragraph is selected (blue)</p>
<p>This paragraph is also selected (blue)</p>

<div>
  <p>This is inside div (not selected)</p>
</div>

</body>
</html>
