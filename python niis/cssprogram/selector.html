<!DOCTYPE html>
<html>
<head>
<style>

/* Universal selector */
* {
  font-family: Arial;
}

/* Element selector */
p {
  color: blue;
}

/* ID selector */
#title {
  color: red;
}

/* Class selector */
.box {
  background-color: yellow;
}

/* Group selector */
h1, h2 {
  text-align: center;
}

</style>
</head>
<body>

<h1 id="title">Main Heading</h1>
<h2>Sub Heading</h2>

<p class="box">This is a paragraph.</p>
<p>This is another paragraph.</p>

</body>
</html>
