<!DOCTYPE html>
<html>
<body>

<h3>All Calculations</h3>
<p id="demo"></p>

<script>
    let p = 1000, r = 5, t = 2;
    let si = (p * r * t) / 100;

    let f = 100;
    let c1 = (f - 32) * 5/9;

    let c = 37;
    let f1 = (c * 9/5) + 32;

    document.getElementById("demo").innerHTML =
        "Simple Interest = " + si + "<br>" +
        "F to C = " + c1 + "<br>" +
        "C to F = " + f1;
</script>

</body>
</html>
