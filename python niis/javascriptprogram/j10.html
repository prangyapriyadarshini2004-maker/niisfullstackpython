<!DOCTYPE html>
<html>
<head>
    <title>Button Example</title>
</head>
<body>

    <h2>Click to Show Message</h2>

    <p id="msg"></p>

    <button onclick="showMessage()">Click Me</button>

    <script>
        function showMessage() {
            document.getElementById("msg").innerHTML = "Hello World!";
        }
    </script>

</body>
</html>
