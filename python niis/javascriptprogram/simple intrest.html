<!DOCTYPE html>
<html>
<body>

<h3>Simple Interest</h3>
<p id="si"></p>

<script>
    let p = 1000;   // principal
    let r = 5;      // rate
    let t = 2;      // time

    let si = (p * r * t) / 100;

    document.getElementById("si").innerHTML = "Simple Interest = " + si;
</script>

</body>
</html>
