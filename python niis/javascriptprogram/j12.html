<!DOCTYPE html>
<html>
<body>

<p id="demo"></p>

<script>
    let num = 10;
    let str = "Hello";
    let bool = true;
    let undef;
    let empty = null;

    document.getElementById("demo").innerHTML =
        typeof num + "<br>" +
        typeof str + "<br>" +
        typeof bool + "<br>" +
        typeof undef + "<br>" +
        typeof empty;
</script>

</body>
</html>
